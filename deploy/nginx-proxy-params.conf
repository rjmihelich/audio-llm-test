# Shared nginx proxy parameters for all app upstreams.
# Include this file inside any location {} block that proxies to a backend:
#
#   location / {
#       include /etc/nginx/proxy_params.conf;
#       proxy_pass http://my_upstream$request_uri;
#   }
#
# Install to server: cp nginx-proxy-params.conf /home/ryan/server/proxy_params.conf
# The server-nginx container mounts /home/ryan/server/nginx.conf -> /etc/nginx/nginx.conf
# but NOT the whole /home/ryan/server/ directory, so this file needs to be embedded
# directly in nginx.conf or the container config needs an extra volume mount.
#
# Recommended: paste the contents of the "# Global http-level settings" section
# into the http {} block of nginx.conf, and paste the upstream blocks + updated
# location blocks from nginx-llmtest-upstream.conf into nginx.conf.

# Retry on connection errors and bad gateway — useful when containers restart
proxy_next_upstream error timeout http_502 http_503 http_504;
proxy_next_upstream_tries 3;
proxy_next_upstream_timeout 15s;

# Connection and read timeouts
proxy_connect_timeout 5s;
proxy_read_timeout 60s;
proxy_send_timeout 60s;

# Pass real client info
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
