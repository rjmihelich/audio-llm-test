services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: audio_llm_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ALT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/audio_llm_test
      ALT_REDIS_URL: redis://redis:6379
      ALT_OLLAMA_BASE_URL: http://host.docker.internal:11434
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./pipeline-studio:/app/pipeline-studio
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/ready', timeout=5)\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ALT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/audio_llm_test
      ALT_REDIS_URL: redis://redis:6379
      ALT_OLLAMA_BASE_URL: http://host.docker.internal:11434
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./pipeline-studio:/app/pipeline-studio
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq backend.app.execution.worker.WorkerSettings

  watchdog:
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ALT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/audio_llm_test
      ALT_REDIS_URL: redis://redis:6379
      ALT_OLLAMA_BASE_URL: http://host.docker.internal:11434
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m backend.app.execution.watchdog
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend
    networks:
      - default
      - web

volumes:
  pgdata:

networks:
  web:
    external: true
