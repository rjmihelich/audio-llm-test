<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="10">
  <title>Deploying — LLM Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0;
      background: #0f172a; color: #e2e8f0;
    }
    .card { text-align: center; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 600; }
    p { color: #94a3b8; margin: 0.25rem 0; }
    .spinner {
      width: 2rem; height: 2rem;
      border: 3px solid #334155; border-top-color: #60a5fa;
      border-radius: 50%; animation: spin 1s linear infinite;
      margin: 1.25rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sub { font-size: 0.8rem; margin-top: 1rem; color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Deploying new version&hellip;</h1>
    <p>The app is starting up. This page refreshes automatically every 10 seconds.</p>
    <p class="sub">Usually ready in 30–60 seconds</p>
  </div>
</body>
</html>
