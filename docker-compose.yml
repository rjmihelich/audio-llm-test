services:
  db:
    image: postgres:16-alpine
    container_name: audio-llm-test-db
    environment:
      POSTGRES_DB: audio_llm_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: audio-llm-test-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: audio-llm-test-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_VERSION: ${APP_VERSION:-dev}
      ALT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/audio_llm_test
      ALT_REDIS_URL: redis://redis:6379
      ALT_OLLAMA_BASE_URL: http://host.docker.internal:11434
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./pipeline-studio:/app/pipeline-studio
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/ping', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - default
      - web
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: audio-llm-test-worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_VERSION: ${APP_VERSION:-dev}
      ALT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/audio_llm_test
      ALT_REDIS_URL: redis://redis:6379
      ALT_OLLAMA_BASE_URL: http://host.docker.internal:11434
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./pipeline-studio:/app/pipeline-studio
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq backend.app.execution.worker.WorkerSettings
    restart: unless-stopped

  watchdog:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: audio-llm-test-watchdog
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_VERSION: ${APP_VERSION:-dev}
      ALT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/audio_llm_test
      ALT_REDIS_URL: redis://redis:6379
      ALT_OLLAMA_BASE_URL: http://host.docker.internal:11434
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m backend.app.execution.watchdog
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: audio-llm-test-frontend
    environment:
      VITE_API_TARGET: http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/package.json:/app/package.json
    depends_on:
      - backend
    networks:
      - default
      - web
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5173', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:

networks:
  web:
    external: true
